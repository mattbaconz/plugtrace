type: plugin
server: paper
version: 26.1.2
port: 25565
build:
  system: gradle
  task: build
  jarTask: jar
  module: paper-modern
  jarPattern: paper-modern/build/libs/PlugTrace-1.0.0.jar
client:
  launcher: prism
  instance: FO 26.1.2
  offline: false
  offlineName: DevPlayer
  joinOnReady: true
  players: []
jvm:
  memory: 2G
run:
  cleanup: never
dev:
  gamemode: creative
  world: flat
  op: true
  peaceful: true
  onlineMode: false
deps: []
watch:
  paths:
    - core-domain/src/
    - storage-sqlite/src/
    - report/src/
    - api/src/
    - platform-common/src/
    - paper-modern/src/
    - folia/src/
    - bukkit-modern/src/
  debounceMs: 300
  reload:
    java: safe
